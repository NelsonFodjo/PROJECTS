<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 180px; padding: 15px; font-family: system-ui, sans-serif; text-align: center; }
    button { padding: 10px; cursor: pointer; width: 100%; border-radius: 5px; border: none; font-weight: bold; }
    .on { background: #ff4b4b; color: white; }
    .off { background: #4bb543; color: white; }
    #status { margin-top: 10px; font-size: 12px; color: #666; }
  </style>
</head>
<body>
  <h3>Voice Bold</h3>
  <button id="toggleBtn" class="off">Start Listening</button>
  <div id="status">Mic is Off</div>
  <script src="popup.js"></script>
</body>
</html>
